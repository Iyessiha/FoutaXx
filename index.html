<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FoutaX — La plateforme fintech éducative dédiée aux marchés boursiers africains. Invest · Learn · Grow" />
    <meta name="theme-color" content="#0A1628" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />

    <!-- Favicon FX -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23E8A020'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='13' fill='%230A1628'>FX</text></svg>" />

    <title>FoutaX — Invest · Learn · Grow</title>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: #0A1628;
        color: #FFFFFF;
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Scrollbar FoutaX */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0A1628; }
      ::-webkit-scrollbar-thumb { background: #2A3A55; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #E8A020; }
      /* Inputs globaux */
      input, select, textarea { font-family: 'DM Sans', sans-serif; }
      input::placeholder { color: rgba(255,255,255,0.2); }
      select option { background: #0F1F38; color: #fff; }
      /* Sélection texte */
      ::selection { background: rgba(232,160,32,0.3); color: #fff; }
      /* Animations */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-in { animation: fadeInUp .3s ease forwards; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
